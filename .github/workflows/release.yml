name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build Chrome extension
        run: pnpm build

      - name: Create Chrome .zip
        run: |
          cd dist/chrome
          zip -r ../../gh-lsp-chrome-${{ github.ref_name }}.zip .

      - name: Build Safari Web Extension
        run: pnpm build:safari

      - name: Create Safari archive
        run: |
          cd dist/safari
          zip -r ../../gh-lsp-safari-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gh-lsp-chrome-${{ github.ref_name }}.zip
            gh-lsp-safari-${{ github.ref_name }}.zip
