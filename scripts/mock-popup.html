<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>gh-lsp Popup Preview</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --text: #1f2328;
    --text-secondary: #656d76;
    --border: #d0d7de;
    --link: #0969da;
    --toggle-active: #2da44e;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e8e8e8; display: flex; align-items: flex-start; justify-content: center; padding: 24px; }
  .gh-lsp-popup { width: 280px; background: var(--bg); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); overflow: hidden; font-family: var(--font); color: var(--text); font-size: 13px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .title { font-size: 14px; font-weight: 600; }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--toggle-active); border-radius: 20px; cursor: pointer; transition: 0.2s; }
  .toggle .slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.2s; transform: translateX(16px); }
  .body { padding: 12px; min-height: 60px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
  .label { font-size: 12px; color: var(--text-secondary); }
  .value { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0; }
  .mode-btn { padding: 2px 8px; border-radius: 4px; font-size: 11px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text); cursor: pointer; font-weight: 600; }
  .footer { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  .options-btn { background: none; border: none; color: var(--link); font-size: 12px; cursor: pointer; font-family: var(--font); }
</style>
</head>
<body>
<div class="gh-lsp-popup">
  <div class="header">
    <span class="title">gh-lsp</span>
    <label class="toggle">
      <input type="checkbox" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="body">
    <div class="row">
      <span class="label">Language</span>
      <span class="value">TypeScript</span>
    </div>
    <div class="row">
      <span class="label">Server</span>
      <span class="value"><span class="dot"></span> Ready</span>
    </div>
    <div class="row">
      <span class="label">Display</span>
      <span class="value"><button class="mode-btn">Popover</button></span>
    </div>
  </div>
  <div class="footer">
    <button class="options-btn">Settings</button>
  </div>
</div>
</body>
</html>
