<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>gh-lsp Options Preview</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --text: #1f2328;
    --text-secondary: #656d76;
    --border: #d0d7de;
    --link: #0969da;
    --toggle-active: #2da44e;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: var(--font); color: var(--text); }
  .gh-lsp-options { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
  .gh-lsp-options__title { font-size: 24px; font-weight: 700; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .section { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 24px; }
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .radio-group { display: flex; gap: 16px; flex-wrap: wrap; }
  .radio-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
  .radio-group input[type="radio"] { accent-color: var(--link); }
  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
  .checkbox-group input[type="checkbox"] { accent-color: var(--toggle-active); }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; font-family: var(--font-mono); font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
  .btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text); cursor: pointer; }
  .range-row { display: flex; align-items: center; gap: 12px; }
  .range-row input[type="range"] { flex: 1; accent-color: var(--link); }
  .range-val { min-width: 50px; text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
  .about-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .about-row .label { margin-bottom: 0; }
  .about-row a { color: var(--link); text-decoration: none; font-size: 13px; }
</style>
</head>
<body>
<div class="gh-lsp-options">
  <h1 class="gh-lsp-options__title">gh-lsp Settings</h1>

  <div class="section">
    <div class="section-title">Display</div>
    <div class="field">
      <span class="label">Display Mode</span>
      <div class="radio-group">
        <label><input type="radio" name="mode" checked> Popover</label>
        <label><input type="radio" name="mode"> Sidebar</label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Languages</div>
    <div class="field">
      <div class="checkbox-group">
        <label><input type="checkbox" checked> TypeScript</label>
        <label><input type="checkbox" checked> JavaScript</label>
        <label><input type="checkbox" checked> Go</label>
        <label><input type="checkbox" checked> Rust</label>
        <label><input type="checkbox" checked> Python</label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Authentication</div>
    <div class="field">
      <span class="label">GitHub Personal Access Token</span>
      <div class="input-row">
        <input type="password" placeholder="ghp_..." value="">
        <button class="btn">Show</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Performance</div>
    <div class="field">
      <span class="label">Hover Debounce</span>
      <div class="range-row">
        <input type="range" min="100" max="1000" step="50" value="300">
        <span class="range-val">300ms</span>
      </div>
    </div>
    <div class="field">
      <span class="label">Cache TTL</span>
      <div class="range-row">
        <input type="range" min="1" max="60" value="10">
        <span class="range-val">10 min</span>
      </div>
    </div>
    <div class="field">
      <span class="label">Worker Idle Timeout</span>
      <div class="range-row">
        <input type="range" min="1" max="30" value="5">
        <span class="range-val">5 min</span>
      </div>
    </div>
    <div class="field">
      <span class="label">Max Workers</span>
      <div class="range-row">
        <input type="range" min="1" max="8" value="2">
        <span class="range-val">2</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Theme</div>
    <div class="field">
      <div class="radio-group">
        <label><input type="radio" name="theme" checked> Auto (match GitHub)</label>
        <label><input type="radio" name="theme"> Light</label>
        <label><input type="radio" name="theme"> Dark</label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">About</div>
    <div class="about-row">
      <span class="label">Version</span>
      <span style="font-size:13px;">0.1.0</span>
    </div>
    <div class="about-row">
      <span class="label">Source</span>
      <a href="#">GitHub</a>
    </div>
  </div>
</div>
</body>
</html>
